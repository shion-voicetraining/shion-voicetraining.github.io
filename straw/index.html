<!DOCTYPE html>
<html lang="ja">

<style>

    border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

    padding-bottom:calc(72px + env(safe-area-inset-bottom));}
  .safety{position:sticky;top:0;z-index:20;background:#fbeef0;color:var(--wine-d);

  .head{padding:20px 18px 10px;}
  .head h1{font-size:19px;letter-spacing:.02em;}
  .head p{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .streak{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--surface);
    border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12.5px;color:var(--ink);}
  .streak b{color:var(--amber);font-size:14px;}

  .screen{padding:6px 16px 24px;flex:1;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;

  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;

  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;

  .lead{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--amber);margin:18px 2px 8px;}
  .lead.sub{color:var(--muted);}
  .sectionNote{font-size:12px;color:var(--muted);margin:2px 2px 12px;}

  table.bp{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
  table.bp th,table.bp td{border:1px solid var(--line);padding:6px 8px;text-align:left;}
  table.bp th{background:var(--surface);color:var(--muted);font-weight:700;}

  .step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .step:last-child{border-bottom:none;}
  .step .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;
    font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .step .b{flex:1;}
  .step .b b{font-size:14px;}
  .step .b span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px;}

  .check{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:7px 0;}
  .check .ic{color:var(--green);font-weight:900;flex:0 0 auto;}

  details.tb{border:1px solid var(--line);border-radius:12px;margin-bottom:9px;background:var(--card);overflow:hidden;}
  details.tb summary{list-style:none;cursor:pointer;padding:12px 14px;font-size:13.5px;font-weight:700;
    display:flex;justify-content:space-between;align-items:center;gap:8px;}
  details.tb summary::-webkit-details-marker{display:none;}
  details.tb summary .arw{color:var(--muted);font-size:12px;transition:transform .2s;}
  details.tb[open] summary .arw{transform:rotate(90deg);}
  details.tb .body{padding:0 14px 13px;font-size:13px;color:#332c26;}
  details.tb .body .why{color:var(--muted);}
  details.tb .body .fix{margin-top:5px;}
  details.tb .body .fix b{color:var(--green);}

  .exhead{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .exhead .lv{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;color:#fff;}
  .ex .goal{font-size:12.5px;color:var(--muted);margin:2px 0 8px;}
  .ex .cue{font-size:12.5px;background:var(--surface);border-radius:10px;padding:9px 11px;margin-bottom:10px;}
  .ex .cue b{color:var(--green);}
  .ex .spec{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .btnrow{display:flex;gap:8px;}
  button{font-family:inherit;font-size:14px;font-weight:700;border:none;border-radius:11px;

  .btn-primary{background:var(--wine);color:#fff;flex:1;}
  .btn-primary:active{background:var(--wine-d);}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
  .btn-tone{background:var(--teal);color:#fff;}

  .runner{text-align:center;padding:8px 0 2px;}
  .runner .phase{font-size:12.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;}
  .runner .phase.work{color:var(--wine);}
  .runner .phase.rest{color:var(--teal);}
  .runner .phase.done{color:var(--green);}
  .runner .big{font-size:52px;font-weight:800;line-height:1.1;margin:2px 0;font-variant-numeric:tabular-nums;}
  .runner .rep{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .ring{width:100%;height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 14px;}
  .ring>i{display:block;height:100%;background:var(--wine);transition:width 1s linear;}
  .runner .phase.rest ~ .ring>i,.ring.rest>i{background:var(--teal);}

  .dynmeter{width:100%;height:16px;background:var(--line);border-radius:999px;overflow:hidden;}
  .dynmeter>i{display:block;height:100%;border-radius:999px;
    background:linear-gradient(90deg,var(--amber-l),var(--wine));transition:width .9s linear;}

  .round{width:100%;text-align:left;margin-bottom:8px;border:1px solid var(--line);border-radius:12px;
    padding:12px 13px;display:flex;gap:10px;align-items:flex-start;color:var(--ink);}

  @keyframes bubbleUp{0%{transform:translateY(0);opacity:0;}
    20%{opacity:.95;}100%{transform:translateY(-44px);opacity:0;}}

  nav button{flex:1;background:none;border:none;border-radius:0;padding:10px 4px;color:var(--muted);

  nav button .ic{font-size:19px;line-height:1;}
  nav button.on{color:var(--wine);}
  .foot{font-size:11px;color:var(--muted);text-align:center;padding:18px 20px 8px;line-height:1.7;}

const TROUBLES = [

  {p:"泡が飛び散る（水ストロー）", why:"息が強すぎる。",
   fix:"息をゆるめて、泡の量が一定になるところを探す。"},

/* ---------- How：10本ラダー ---------- */
const LV = {
  beg:{name:"初級", color:"#1e7a42"},
  mid:{name:"中級", color:"#b06800"},
  adv:{name:"上級", color:"#b83060"},
};
// toneMode: hold / glideUpDown / glideUp / glide2oct / scale / swell / none
// 特別フラグ: semitone(1回ごとに半音上げる) / dynamics(強弱メーター) / water(泡アニメ) / mode:"phrase"(カウントなし3回)
const EXERCISES = [
  {id:1, lv:"beg", title:"ロングトーン「ウー」", straw:"太（タピオカ）",
   goal:"まず息を均一に通して、声を乗せる感覚をつかむ入口。",
   cue:"頬に軽い振動を感じ、音が途切れず一定に伸びればOK。",
   reps:3, workSec:10, restSec:8, toneHz:220, toneMode:"hold"},
  {id:2, lv:"beg", title:"ゆるいサイレン（なめらか上下）", straw:"太（タピオカ）",
   goal:"力まずに音を上下させる。救急車のサイレンを低くゆっくりにしたイメージ。",
   cue:"低→高→低が滑らかに。喉で押さず、息で音が動く感じ。",
   reps:4, workSec:8, restSec:6, toneHz:196, toneMode:"glideUpDown"},
  {id:3, lv:"beg", title:"ロングトーン（通常8mm）", straw:"通常（ドリンク／コーヒー用・約8mm）",
   goal:"タピオカより少し手応えのある“身近な標準”で伸ばす。",
   cue:"頬と唇に軽い振動。喉はむしろ楽なのが正解。",
   reps:3, workSec:12, restSec:8, toneHz:220, toneMode:"hold"},
  {id:4, lv:"mid", title:"サイレン（1オクターブ上下）", straw:"通常（約8mm）",

   reps:5, workSec:8, restSec:6, toneHz:196, toneMode:"glideUpDown"},
  {id:5, lv:"mid", title:"スケール（半音ずつ上げる）", straw:"通常（約8mm）",
   goal:"ドレミを1回ごとに半音ずつ上げて、音域全体をならしていく。",
   cue:"どの高さも同じ息の量・同じ圧で。基準音が1本ごとに半音上がります。",
   reps:6, workSec:9, restSec:5, toneHz:175, toneMode:"scale", semitone:true},
  {id:6, lv:"mid", title:"2オクターブ・サイレン", straw:"細め（4mm・100均）",
   goal:"背圧を上げて音域を広げる。高音も背圧で楽に届かせる。",

   reps:4, workSec:10, restSec:8, toneHz:147, toneMode:"glide2oct"},
  {id:7, lv:"mid", title:"メッサ・ディ・ヴォーチェ（強弱）", straw:"細め（4mm・100均）",
   goal:"呼気圧のコントロール。1音の中で小さく→大きく→小さく。",
   cue:"画面の山＝声を大きく。真ん中で最大、両端で最小。喉で押さず息の量で。",
   reps:3, workSec:12, restSec:8, toneHz:220, toneMode:"swell", dynamics:true},
  {id:8, lv:"adv", title:"水ストロー・ロングトーン（5cm）", straw:"細め4mm ＋ 水5cm",

   cue:"上下させても泡の量を保つ。飛び散る＝息が強すぎ。",
   reps:4, workSec:10, restSec:10, toneHz:196, toneMode:"glideUpDown", water:true},
  {id:10, lv:"adv", title:"課題曲のサビを3回", straw:"通常（約8mm・歌い切れる太さで）",
   goal:"今の練習曲のサビを3回。ストロー→ウー→歌詞で、楽な発声を歌に持ち込む仕上げ。",

   rounds:[
     {n:"1回目", t:"ストローでサビを歌う", d:"ストローに息を通しながら、サビのメロディをなぞる。"},
     {n:"2回目", t:"ストローを外して「ウー」", d:"同じサビを、口を軽くすぼめた「ウー」で。ストローの楽さを思い出す。"},
     {n:"3回目", t:"歌詞で歌う", d:"そのまま歌詞で。1・2回目の“楽な鳴り”を保てたら成功。"},
   ]},
];

/* ---------- Web Audio：お手本音 ---------- */
function useAudio(){
  const ctxRef = useRef(null);
  const nodeRef = useRef(null); // {osc,gain}
  function ensure(){
    if(!ctxRef.current){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      ctxRef.current = new AC();
    }
    if(ctxRef.current.state === "suspended") ctxRef.current.resume();
    return ctxRef.current;
  }
  function stop(){
    const n = nodeRef.current;
    if(n){ try{ n.osc.stop(); }catch(e){} try{ n.osc.disconnect(); n.gain.disconnect(); }catch(e){} nodeRef.current=null; }
  }
  function play(hz, durSec, mode){
    const ctx = ensure();
    if(!ctx || !hz || mode==="none") return;
    stop();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    const t0 = ctx.currentTime;
    const f = osc.frequency;
    if(mode==="glideUpDown"){
      f.setValueAtTime(hz,t0);
      f.linearRampToValueAtTime(hz*2, t0+durSec/2);
      f.linearRampToValueAtTime(hz, t0+durSec);
    } else if(mode==="glideUp"){
      f.setValueAtTime(hz,t0);
      f.linearRampToValueAtTime(hz*2, t0+durSec);
    } else if(mode==="glide2oct"){
      f.setValueAtTime(hz,t0);
      f.linearRampToValueAtTime(hz*4, t0+durSec*0.6);
      f.linearRampToValueAtTime(hz, t0+durSec);
    } else if(mode==="scale"){
      const ratios=[1, 9/8, 5/4, 4/3, 3/2, 4/3, 5/4, 9/8, 1];
      const step = durSec/ratios.length;
      ratios.forEach((r,i)=> f.setValueAtTime(hz*r, t0+i*step));
    } else { // hold / swell（周波数は一定）
      f.setValueAtTime(hz,t0);
    }
    if(mode==="swell"){
      // 強弱お手本：小さく→大きく→小さく（クレッシェンド／デクレッシェンド）
      gain.gain.setValueAtTime(0.02,t0);
      gain.gain.linearRampToValueAtTime(0.22, t0+durSec/2);
      gain.gain.linearRampToValueAtTime(0.02, t0+durSec);
    } else {
      gain.gain.setValueAtTime(0,t0);
      gain.gain.linearRampToValueAtTime(0.16, t0+0.06);
      gain.gain.setValueAtTime(0.16, Math.max(t0+0.06, t0+durSec-0.1));
      gain.gain.linearRampToValueAtTime(0, t0+durSec);
    }
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0+durSec+0.03);
    nodeRef.current = {osc,gain};
  }
  useEffect(()=>()=>stop(),[]);
  return {play, stop, ensure};
}

/* ---------- アクセス・フィードバック収集（GAS → Googleスプレッドシート） ---------- */
// 既存2作（音楽クイズ・ハモリ）と同方式。GASのWebアプリURLを下に貼ると送信が有効になる。
// 空欄のあいだは一切送信しない（＝プライバシー面で安全なデフォルト）。
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwZbWQgbUTr8Bop9pB1VTCSwUVkUS1JWerCrM7L1TW3dJklIlL03LiYUOMLU6EV5kxr/exec";
function logEvent(type, payload){
  if(!GOOGLE_SHEET_URL) return;
  try{
    fetch(GOOGLE_SHEET_URL, {
      method:"POST", mode:"no-cors", keepalive:true,
      headers:{"Content-Type":"text/plain;charset=utf-8"}, // CORSプリフライト回避のためtext/plain
      body: JSON.stringify(Object.assign({type:type, ts:new Date().toISOString()}, payload||{}))
    });
  }catch(e){ /* 送信失敗はアプリ動作に影響させない */ }
}

/* ---------- 練習記録（localStorage・軽量ストリーク） ---------- */
const LS_KEY = "straw_trainer_log_v1";
function todayStr(){ return new Date().toLocaleDateString("sv-SE"); } // YYYY-MM-DD(ローカル)
function loadLog(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {last:"", streak:0}; }
  catch(e){ return {last:"", streak:0}; }
}
function markDone(){
  const log = loadLog();
  const today = todayStr();
  if(log.last === today) return log; // 今日は記録済み
  const yesterday = new Date(Date.now()-86400000).toLocaleDateString("sv-SE");
  const next = {last:today, streak: log.last===yesterday ? (log.streak||0)+1 : 1};
  try{ localStorage.setItem(LS_KEY, JSON.stringify(next)); }catch(e){}
  return next;
}

/* ---------- タイマー（1種目の実行） ---------- */
function Runner({ex, audio, onDone}){
  // st: {phase:'idle'|'work'|'rest'|'done', rep, sec}
  const st = useRef({phase:"idle", rep:0, sec:0});
  const [,setV] = useState(0);
  const timerRef = useRef(null);
  const render = ()=> setV(v=>v+1);

  function clearTimer(){ if(timerRef.current){ clearInterval(timerRef.current); timerRef.current=null; } }

  function repHz(rep){
    // semitone: 1本ごとに半音（周波数比 2^(1/12)）上げる
    return ex.semitone ? ex.toneHz * Math.pow(2,(rep-1)/12) : ex.toneHz;
  }
  function startWork(rep){
    st.current = {phase:"work", rep, sec:ex.workSec};
    audio.play(repHz(rep), ex.workSec, ex.toneMode);
    render();
  }
  function tick(){
    const s = st.current;
    if(s.sec > 1){ st.current = {...s, sec:s.sec-1}; render(); return; }
    // フェーズ終了
    if(s.phase === "work"){
      audio.stop();
      if(s.rep >= ex.reps){
        clearTimer();
        st.current = {phase:"done", rep:s.rep, sec:0}; render();
        onDone();
        logEvent("complete", {id:ex.id, title:ex.title});
      } else if(ex.restSec > 0){
        st.current = {phase:"rest", rep:s.rep, sec:ex.restSec}; render();
      } else {
        startWork(s.rep+1);
      }
    } else if(s.phase === "rest"){
      startWork(s.rep+1);
    }
  }
  function begin(){
    audio.ensure();      // ユーザー操作の中でAudioContextを起こす
    clearTimer();
    startWork(1);
    timerRef.current = setInterval(tick, 1000);
  }
  function reset(){
    clearTimer(); audio.stop();
    st.current = {phase:"idle", rep:0, sec:0}; render();
  }
  useEffect(()=>()=>{ clearTimer(); audio.stop(); },[]);

  const s = st.current;
  if(s.phase === "idle"){
    return (
      <div className="btnrow">
        <button className="btn-primary" onClick={begin}>▶ スタート（{ex.reps}本）</button>
        {ex.toneMode!=="none" &&
          <button className="btn-tone" onClick={()=>audio.play(ex.toneHz, Math.min(ex.workSec,6), ex.toneMode)}>♪ お手本</button>}
      </div>
    );
  }
  const total = s.phase==="rest" ? ex.restSec : ex.workSec;
  const pct = total ? Math.round((s.sec/total)*100) : 0;
  const phaseLabel = s.phase==="work" ? "発声" : s.phase==="rest" ? "休憩" : "完了";
  return (
    <div className="runner">
      <div className={"phase "+s.phase}>{phaseLabel}</div>
      {s.phase!=="done" ? (
        <>
          <div className="big">{s.sec}</div>
          <div className="rep">
            {s.rep} / {ex.reps} 本目
            {ex.semitone && s.phase==="work" && <span style={{color:"var(--amber)",fontWeight:700}}>　♪ +{s.rep-1}半音</span>}
          </div>
          <div className={"ring"+(s.phase==="rest"?" rest":"")}><i style={{width:pct+"%"}}></i></div>
          {ex.dynamics && s.phase==="work" && (function(){
            const p = (ex.workSec - s.sec) / ex.workSec;      // 0→1
            const inten = Math.max(0, 1 - Math.abs(2*p - 1));  // 三角波 0→1→0
            const label = inten>0.66 ? "強く！" : inten>0.33 ? "だんだん…" : "弱く";
            return (
              <div style={{margin:"0 0 12px"}}>
                <div style={{fontSize:"13px",fontWeight:800,color:"var(--wine)",marginBottom:"5px"}}>{label}</div>
                <div className="dynmeter"><i style={{width:(18+inten*82)+"%"}}></i></div>
                <div style={{fontSize:"11px",color:"var(--muted)",marginTop:"5px"}}>小 → 大 → 小（真ん中で最大）</div>
              </div>
            );
          })()}
          <div className="btnrow"><button className="btn-ghost" style={{flex:1}} onClick={reset}>■ ストップ</button></div>
        </>
      ) : (
        <>
          <div className="big" style={{fontSize:"38px"}}>お疲れさま！</div>
          <div className="rep">今日の練習を記録しました 🎉</div>
          <div className="btnrow"><button className="btn-ghost" style={{flex:1}} onClick={reset}>もう一度</button></div>
        </>
      )}
    </div>
  );
}

/* ---------- 課題曲（カウントなし・サビ3回のチェック式） ---------- */
function PhraseRunner({ex, onDone}){
  const [done, setDone] = useState([false,false,false]);
  const firedRef = useRef(false);
  function toggle(i){
    setDone(d=>{
      const nd = d.slice(); nd[i] = !nd[i];
      if(nd.every(Boolean) && !firedRef.current){
        firedRef.current = true;
        onDone();
        logEvent("complete", {id:ex.id, title:ex.title});
      }
      return nd;
    });
  }
  const allDone = done.every(Boolean);
  return (
    <div>
      {ex.rounds.map((r,i)=>(
        <button key={i} onClick={()=>toggle(i)} className="round"
          style={{background: done[i] ? "#eaf6ee" : "var(--surface)",
                  borderColor: done[i] ? "var(--green)" : "var(--line)"}}>
          <span style={{color: done[i] ? "var(--green)" : "var(--muted)", fontWeight:900, fontSize:"16px"}}>{done[i] ? "✓" : "○"}</span>
          <span>
            <b style={{color: done[i] ? "var(--green)" : "var(--ink)"}}>{r.n}：{r.t}</b>
            <span style={{display:"block",fontSize:"12px",color:"var(--muted)",fontWeight:400,marginTop:"2px"}}>{r.d}</span>
          </span>
        </button>
      ))}
      {allDone && <div style={{textAlign:"center",color:"var(--green)",fontWeight:800,marginTop:"4px"}}>お疲れさま！記録しました 🎉</div>}
    </div>
  );
}

        );
      })}

  );
}

      <div className="safety">⚠️ 痛み・違和感が出たら、すぐに中止してください</div>
      <div className="head">
        <h1>ストロー発声トレーナー <span style={{fontSize:"12px",color:"var(--muted)",fontWeight:400}}>β</span></h1>
        <p>SOVT（半閉鎖声道）で、力まない発声を毎日のセルフケアに。</p>
        <div className="streak">
          🔥 <span>連続</span><b>{log.streak||0}</b><span>日</span>
          <span style={{color:"var(--muted)"}}>{isToday ? "／今日は達成 ✓" : "／今日はまだ"}</span>
        </div>
      </div>

      {tab==="why"      && <WhyScreen/>}
      {tab==="how"      && <HowtoScreen audio={audio}/>}
      {tab==="menu"     && <MenuScreen audio={audio} onDone={onDone}/>}
      {tab==="feedback" && <FeedbackScreen/>}

      <div className="foot">
        本アプリは声のセルフケアを補助する教育目的のツールです。診断・治療を目的とするものではありません。<br/>
        痛み・声がれ・違和感が続く場合は、耳鼻咽喉科など専門家にご相談ください。<br/>
        © SHIONボイストレーニング教室
      </div>

      <nav><div className="inner">
        {tabs.map(t=>(
          <button key={t.id} className={tab===t.id?"on":""} onClick={()=>{audio.stop(); setTab(t.id);}}>
            <span className="ic">{t.ic}</span>{t.label}
          </button>
        ))}
      </div></nav>
    </div>
  );
}

const el = document.getElementById("loading");
if(el) el.style.display = "none";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
